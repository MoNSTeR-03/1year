<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🌳 EL ÁRBOL DEL AMOR | AHMAD 🌙 RYOKO 🌳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'Segoe UI', 'Courier New', monospace;
            background: linear-gradient(to bottom, #0a2a1a, #051510);
            color: white;
        }

        .ui-panel {
            position: absolute;
            bottom: 15px;
            left: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 12px;
            border: 1px solid #88ffaa;
            box-shadow: 0 0 25px rgba(136, 255, 170, 0.3);
            z-index: 20;
            text-align: center;
            pointer-events: auto;
        }

        .message-box {
            background: #0a1a0add;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #88ffaa;
            color: #e0ffe8;
            font-size: 0.7rem;
            line-height: 1.6;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            -webkit-overflow-scrolling: touch;
        }

        .fruits-counter {
            font-size: 0.7rem;
            color: #aaffcc;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .reset-btn {
            background: #66ff88aa;
            border: 1px solid #88ffaa;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-block;
            transition: 0.08s linear;
            font-family: monospace;
            touch-action: manipulation;
            width: 80%;
        }

        .reset-btn:active {
            transform: scale(0.96);
            background: #88ffaa;
            color: #0a1a0a;
        }

        .title {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #ccffaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .message-box { font-size: 0.65rem; max-height: 125px; padding: 10px; }
            .reset-btn { padding: 8px 16px; font-size: 0.75rem; width: 90%; }
            .fruits-counter { font-size: 0.65rem; }
            .title { font-size: 0.6rem; top: 12px; }
        }
    </style>
</head>
<body>
    <div class="title">🌳 EL ÁRBOL DEL AMOR | AHMAD ✨ RYOKO 🌳</div>
    <div class="ui-panel" id="uiPanel">
        <div class="fruits-counter" id="fruitsCounter">🍎 FRUTAS POR RECOGER: 7/7 🍎</div>
        <div class="message-box" id="romanticMessage">
            ✨ Toca una FRUTA del árbol para recogerla... ✨<br>
            Cada fruta contiene un mensaje de amor de Ahmad para ti. 🌳💚
        </div>
        <div class="reset-btn" id="resetBtn">🔄 REINICIAR ÁRBOL 🔄</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a2a1a);
        scene.fog = new THREE.FogExp2(0x0a2a1a, 0.008);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.5, 10);
        camera.lookAt(0, 2.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Luces
        const ambientLight = new THREE.AmbientLight(0x224422);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffdd99, 1);
        mainLight.position.set(3, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x88ff66, 0.5);
        backLight.position.set(0, 3, -5);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa88, 0.4);
        fillLight.position.set(2, 2, 3);
        scene.add(fillLight);

        // Cielo estrellado
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 1500; i++) {
            starPos.push((Math.random() - 0.5) * 400);
            starPos.push((Math.random() - 0.5) * 150 + 10);
            starPos.push((Math.random() - 0.5) * 150 - 80);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffeedd, size: 0.08, transparent: true, opacity: 0.6 }));
        scene.add(stars);

        // Suelo (césped)
        const ground = new THREE.Mesh(new THREE.CircleGeometry(8, 32), new THREE.MeshStandardMaterial({ color: 0x2a5a2a, roughness: 0.9, metalness: 0.1 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Césped decorativo (pequeñas esferas verdes)
        for (let i = 0; i < 300; i++) {
            const grass = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 0.15, 3), new THREE.MeshStandardMaterial({ color: 0x4a8a3a }));
            grass.position.x = (Math.random() - 0.5) * 12;
            grass.position.z = (Math.random() - 0.5) * 12;
            grass.position.y = -0.45;
            grass.castShadow = true;
            scene.add(grass);
        }

        // ========= EL ÁRBOL DEL AMOR =========
        const treeGroup = new THREE.Group();
        
        // Tronco
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7 });
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 2.2, 8), trunkMat);
        trunk.position.y = 0.6;
        trunk.castShadow = true;
        treeGroup.add(trunk);
        
        // Copa del árbol (varias capas de esferas verdes)
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x4a9a3a, emissive: 0x2a6a1a, emissiveIntensity: 0.1 });
        const leafMat2 = new THREE.MeshStandardMaterial({ color: 0x5aaa4a, emissive: 0x2a6a1a, emissiveIntensity: 0.1 });
        const leafMat3 = new THREE.MeshStandardMaterial({ color: 0x3a8a2a, emissive: 0x2a6a1a, emissiveIntensity: 0.1 });
        
        const leafLayer1 = new THREE.Mesh(new THREE.SphereGeometry(0.9, 32, 32), leafMat);
        leafLayer1.position.y = 1.3;
        leafLayer1.castShadow = true;
        treeGroup.add(leafLayer1);
        
        const leafLayer2 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), leafMat2);
        leafLayer2.position.y = 1.9;
        leafLayer2.castShadow = true;
        treeGroup.add(leafLayer2);
        
        const leafLayer3 = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), leafMat3);
        leafLayer3.position.y = 2.4;
        leafLayer3.castShadow = true;
        treeGroup.add(leafLayer3);
        
        const leafLayer4 = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), leafMat);
        leafLayer4.position.y = 2.85;
        leafLayer4.castShadow = true;
        treeGroup.add(leafLayer4);
        
        // Hojas pequeñas decorativas
        for (let i = 0; i < 60; i++) {
            const smallLeaf = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: 0x6aba4a }));
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.8 + Math.random() * 0.6;
            const yOffset = 1.2 + Math.random() * 2;
            smallLeaf.position.x = Math.cos(angle) * radius;
            smallLeaf.position.z = Math.sin(angle) * radius;
            smallLeaf.position.y = yOffset;
            smallLeaf.castShadow = true;
            treeGroup.add(smallLeaf);
        }
        
        scene.add(treeGroup);
        
        // ========= FRUTAS (con posiciones alrededor del árbol) =========
        const fruitsData = [
            { 
                name: "🍓 FRESA",
                fruitType: "fresa",
                emoji: "🍓",
                color: 0xff3366,
                message: "💖 AHMAD → RYOKO 💖\n\nMi hermosa Ryoko, esta fresa es como el primer latido de mi corazón cuando te vi. Dulce, roja, llena de vida. Eres la razón por la que sonrío cada mañana. Cada día a tu lado es un regalo que atesoro más que cualquier tesoro del universo. Gracias por ser mi novia, mi amiga, mi todo. Te quiero con cada fibra de mi ser. 💗",
                position: { x: 1.0, y: 1.8, z: 0.6 },
                size: 0.22
            },
            { 
                name: "🍌 PLÁTANO",
                fruitType: "platano",
                emoji: "🍌",
                color: 0xffdd66,
                message: "💛 AHMAD → RYOKO 💛\n\nRyoko, mi guerrera hermosa. Este plátano representa la energía y la alegría que me das cada día. Cuando estoy contigo, siento que puedo conquistar el mundo entero. Tu risa es mi combustible, tu sonrisa es mi sol. No hay día que no agradezca tenerte en mi vida. Eres mi fuerza, mi motivación, mi todo. Te amo más de lo que las palabras pueden expresar. 💛",
                position: { x: -0.8, y: 1.9, z: 0.9 },
                size: 0.28
            },
            { 
                name: "🎃 CALABAZA",
                fruitType: "calabaza",
                emoji: "🎃",
                color: 0xff8844,
                message: "🧡 AHMAD → RYOKO 🧡\n\nMi amor, esta calabaza es como nuestro amor: grande, fuerte y lleno de magia. Contigo he descubierto que el amor verdadero existe, que la vida es más hermosa cuando se comparte. Eres mi princesa guerrera, mi compañera de aventuras, mi hogar. Cada momento a tu lado es un capítulo hermoso en nuestra historia. Gracias por elegirme cada día. Te quiero con locura. 🧡",
                position: { x: -1.2, y: 2.2, z: -0.5 },
                size: 0.26
            },
            { 
                name: "🍉 SANDÍA",
                fruitType: "sandia",
                emoji: "🍉",
                color: 0x44aa55,
                message: "💚 AHMAD → RYOKO 💚\n\nRyoko, mi vida, mi todo. Esta sandía es dulce por fuera y por dentro, como tú. Eres refrescante como una brisa de verano, cálida como el sol, hermosa como la luna. No hay nadie en este universo que pueda compararse a ti. Eres única, especial, y completamente mía (y yo completamente tuyo). Gracias por ser mi novia, mi amante, mi mejor amiga. Te amo hasta el infinito y más allá. 💚",
                position: { x: 1.3, y: 2.4, z: -0.3 },
                size: 0.3
            },
            { 
                name: "🍇 UVA",
                fruitType: "uva",
                emoji: "🍇",
                color: 0xaa66cc,
                message: "💜 AHMAD → RYOKO 💜\n\nMi pequeña uva dulce, mi amor. Esta uva representa todos los pequeños momentos que atesoro de ti: tus risas, tus miradas, tus abrazos. Cada pequeño detalle tuyo es un tesoro para mí. Eres la razón por la que mi corazón late más fuerte. No importa lo que pase, siempre voy a estar a tu lado, sosteniendo tu mano, amándote con todo lo que soy. Te quiero, mi guerrera hermosa. 💜",
                position: { x: -0.5, y: 2.6, z: -1.0 },
                size: 0.18
            },
            { 
                name: "🥬 LECHUGA",
                fruitType: "lechuga",
                emoji: "🥬",
                color: 0x66dd66,
                message: "💚 AHMAD → RYOKO 💚\n\nRyoko, mi amor fresco y puro como esta lechuga. Contigo he aprendido que el amor verdadero es simple y hermoso. No necesitamos grandes gestos ni regalos caros. Solo necesito verte sonreír para sentir que tengo todo lo que necesito. Eres mi paz, mi calma en medio de la tormenta. Gracias por ser tan increíblemente maravillosa. Eres mi todo. 💚",
                position: { x: 1.1, y: 2.0, z: -1.2 },
                size: 0.2
            },
            { 
                name: "🍊 NARANJA",
                fruitType: "naranja",
                emoji: "🍊",
                color: 0xffaa44,
                message: "🧡 AHMAD → RYOKO 🧡\n\nMi naranja brillante, mi sol. Esta naranja es como tu personalidad: brillante, radiante, llena de energía positiva. Eres la luz de mis días, la estrella que guía mis noches. No hay obstáculo que no pueda superar si estás a mi lado. Contigo, todo es posible. Te prometo amarte y cuidarte por siempre, en las buenas y en las malas, en la salud y en la enfermedad, hasta que el universo entero se desvanezca. Te amo, Ryoko. 💗",
                position: { x: -0.3, y: 1.5, z: 1.2 },
                size: 0.24
            }
        ];

        let fruits = [];
        let collectedCount = 0;
        let poemShown = false;
        let time = 0;
        let flyingFruits = [];

        const finalPoem = `💗💗💗 POEMA DE AHMAD PARA RYOKO 💗💗💗

Bajo este árbol del amor,
crecen mis sentimientos por ti.
Cada fruta que has recogido
es un te quiero que escribí.

Fresa, plátano, calabaza,
sandía, uva, lechuga y naranja.
Cada una lleva un pedazo
del amor que en mi alma alberga.

Ryoko, dueña de mi vida,
novia hermosa, luz de mi ser.
Contigo cada día es un sueño,
y quiero envejecer contigo, mujer.

Gracias por cada sonrisa,
gracias por cada abrazo sincero.
Eres mi fruta más dulce,
mi amor más verdadero.

Te quiero hoy, mañana y siempre,
bajo este árbol y bajo las estrellas.
Ryoko, eres mi todo,
y siempre serás mi más bella.

— Ahmad 💕🌳
✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨✨`;

        // Crear una fruta 3D con esfera y etiqueta
        function createFruit(data, index) {
            const group = new THREE.Group();
            const pos = data.position;
            
            // Cuerpo de la fruta (esfera con color)
            const fruitMat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.3, roughness: 0.3 });
            const fruitBody = new THREE.Mesh(new THREE.SphereGeometry(data.size, 32, 32), fruitMat);
            fruitBody.castShadow = true;
            group.userData.isFruit = true;
            
            // Hojita encima de la fruta
            const leafMatFruit = new THREE.MeshStandardMaterial({ color: 0x6aba4a });
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.12, 6), leafMatFruit);
            leaf.position.y = data.size + 0.05;
            group.add(leaf);
            
            // Etiqueta CSS2D con el nombre y emoji
            const labelDiv = document.createElement('div');
            labelDiv.textContent = `${data.emoji} ${data.name} ${data.emoji}`;
            labelDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
            labelDiv.style.backdropFilter = 'blur(8px)';
            labelDiv.style.borderRadius = '30px';
            labelDiv.style.padding = '6px 14px';
            labelDiv.style.border = `2px solid ${new THREE.Color(data.color).getStyle()}`;
            labelDiv.style.fontSize = '0.75rem';
            labelDiv.style.fontWeight = 'bold';
            labelDiv.style.color = '#ddffcc';
            labelDiv.style.fontFamily = 'monospace';
            labelDiv.style.whiteSpace = 'nowrap';
            labelDiv.style.cursor = 'pointer';
            labelDiv.style.touchAction = 'manipulation';
            labelDiv.style.textAlign = 'center';
            
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, -data.size - 0.12, 0);
            group.add(label);
            
            group.position.set(pos.x, pos.y, pos.z);
            group.userData = {
                index: index,
                message: data.message,
                name: data.name,
                collected: false,
                color: data.color
            };
            
            scene.add(group);
            
            return {
                group: group,
                label: label,
                collected: false,
                index: index,
                message: data.message,
                name: data.name,
                startY: pos.y,
                startX: pos.x,
                startZ: pos.z
            };
        }

        // Crear todas las frutas
        fruitsData.forEach((data, i) => {
            const fruit = createFruit(data, i);
            fruits.push(fruit);
        });

        function updateCounterUI() {
            const counter = document.getElementById('fruitsCounter');
            if (counter) {
                const remaining = 7 - collectedCount;
                if (!poemShown) {
                    counter.innerHTML = `🍎 FRUTAS POR RECOGER: ${remaining}/7 🍎`;
                } else {
                    counter.innerHTML = `💞 ¡EL ÁRBOL HA FLORECIDO! AMOR ETERNO 💞`;
                }
            }
        }

        function showMessage(msg) {
            const box = document.getElementById('romanticMessage');
            if (box) {
                box.innerHTML = msg;
                box.scrollTop = 0;
            }
        }

        function showFinalPoem() {
            if (poemShown) return;
            poemShown = true;
            showMessage(`💖💖💖 ¡RYOKO, MI AMOR! HAS RECOGIDO TODAS LAS FRUTAS DEL ÁRBOL 💖💖💖\n\n${finalPoem}\n\n🌳✨ El árbol del amor florece gracias a ti. Gracias por ser mi novia, mi todo. ✨🌳`);
            
            // Hacer que el árbol florezca (flores brillantes)
            for (let i = 0; i < 200; i++) {
                const flower = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff88cc, emissive: 0xff66aa }));
                const angle = Math.random() * Math.PI * 2;
                const radius = 1 + Math.random() * 1.5;
                const yPos = 1.5 + Math.random() * 2;
                flower.position.x = Math.cos(angle) * radius;
                flower.position.z = Math.sin(angle) * radius;
                flower.position.y = yPos;
                scene.add(flower);
                setTimeout(() => scene.remove(flower), 4000);
            }
            
            // Explosión de corazones
            for (let i = 0; i < 300; i++) {
                const heart = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff44aa }));
                heart.position.set((Math.random() - 0.5) * 15, Math.random() * 10 + 1, (Math.random() - 0.5) * 12 - 5);
                scene.add(heart);
                setTimeout(() => scene.remove(heart), 4000);
            }
            
            // Hacer que el árbol brille
            treeGroup.children.forEach(child => {
                if (child.material) {
                    child.material.emissiveIntensity = 0.3;
                }
            });
        }

        function collectFruit(fruit) {
            if (fruit.collected) return;
            if (poemShown) {
                showMessage("💗 Ya recogiste todas las frutas, mi amor. El árbol floreció gracias a ti. Reinicia para revivir la magia. 💗");
                return;
            }
            
            fruit.collected = true;
            collectedCount++;
            
            // Mostrar el mensaje
            showMessage(`🍎✨ ¡${fruitsData[fruit.index].name} RECOGIDA! ✨🍎\n\n${fruit.message}\n\n💚 Esta fruta vuela hacia el cielo con mi amor por ti... 💚`);
            
            // Añadir anillo de luz alrededor de la fruta
            const ringGeo = new THREE.TorusGeometry(0.35, 0.05, 32, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: fruit.userData.color, emissive: fruit.userData.color });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            fruit.group.add(ring);
            
            const startY = fruit.group.position.y;
            const startTime = time;
            const duration = 2.2;
            
            flyingFruits.push({
                fruit: fruit,
                startY: startY,
                startTime: time,
                duration: duration
            });
            
            updateCounterUI();
            
            if (collectedCount === 7) {
                setTimeout(() => showFinalPoem(), 1000);
            }
        }

        // Raycaster para detectar toques en las frutas
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function handleTap(e) {
            if (poemShown) return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const clickableObjects = [];
fruits.forEach(f => {
    f.group.traverse(child => {
        if (child.isMesh) clickableObjects.push(child);
    });
});
            const intersects = raycaster.intersectObjects(clickableObjects);
            
            if (intersects.length > 0) {
               const hit = intersects[0].object;

// go up to the parent group
let parent = hit;
while (parent && !parent.userData.index && parent.parent) {
    parent = parent.parent;
}

const fruit = fruits.find(f => f.group === parent);
                if (fruit && !fruit.collected) {
                    collectFruit(fruit);
                } else if (fruit && fruit.collected) {
                    showMessage("🍎✨ Esta fruta ya voló al cielo con mi amor, igual que mi corazón vuela cuando pienso en ti. ✨🍎");
                }
            }
        }

        function animate() {
            time += 0.016;
            requestAnimationFrame(animate);
            
            // Animar frutas volando hacia el cielo
            for (let i = flyingFruits.length - 1; i >= 0; i--) {
                const fly = flyingFruits[i];
                const elapsed = time - fly.startTime;
                const progress = Math.min(elapsed / fly.duration, 1);
                
                if (progress >= 1) {
                    scene.remove(fly.fruit.group);
                    fly.fruit.group.children.forEach(child => {
                        if (child.isCSS2DObject) scene.remove(child);
                    });
                    flyingFruits.splice(i, 1);
                } else {
                    const ease = Math.sin(progress * Math.PI / 2);
                    const newY = fly.startY + (7 * ease);
                    fly.fruit.group.position.y = newY;
                    fly.fruit.group.rotation.y = progress * Math.PI * 2;
                    fly.fruit.group.rotation.x = Math.sin(progress * Math.PI) * 0.5;
                    const scale = 1 - (ease * 0.1);
                    fly.fruit.group.scale.set(scale, scale, scale);
                }
            }
            
            // Animar frutas restantes (flotando suavemente)
            fruits.forEach((fruit, idx) => {
                if (!fruit.collected) {
                    const floatY = Math.sin(time * 1.5 + idx) * 0.04;
                    fruit.group.position.y = fruit.startY + floatY;
                    fruit.group.rotation.y = Math.sin(time * 0.8 + idx) * 0.15;
                }
            });
            
            // Animar las hojas del árbol
            stars.rotation.y += 0.0003;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();

        // Event listeners
        window.addEventListener('click', handleTap);
        window.addEventListener('touchstart', handleTap);
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            window.location.reload();
        });
        
        // Partículas mágicas (polen/flores voladoras)
        const pollenCount = 300;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = [];
        for (let i = 0; i < pollenCount; i++) {
            pollenPos.push((Math.random() - 0.5) * 14);
            pollenPos.push(Math.random() * 6);
            pollenPos.push((Math.random() - 0.5) * 12 - 4);
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pollenPos), 3));
        const pollen = new THREE.Points(pollenGeo, new THREE.PointsMaterial({ color: 0xffcc88, size: 0.05, transparent: true }));
        scene.add(pollen);
        
        function animatePollen() {
            requestAnimationFrame(animatePollen);
            pollen.rotation.y += 0.001;
            pollen.rotation.x = Math.sin(time * 0.2) * 0.05;
        }
        animatePollen();
        
        updateCounterUI();
        
        console.log("🌳 El Árbol del Amor está listo - 7 frutas para recoger: fresa, plátano, calabaza, sandía, uva, lechuga y naranja 💕");
    </script>
</body>
</html>
